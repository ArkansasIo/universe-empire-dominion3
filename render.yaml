services:
  # Web Service
  - type: web
    name: stellar-dominion
    env: node
    region: oregon
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/status
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: stellar-dominion-db
          property: connectionString
    autoDeploy: true

  # PostgreSQL Database
databases:
  - name: stellar-dominion-db
    databaseName: stellar_dominion
    plan: starter
    region: oregon
    ipAllowList: []
